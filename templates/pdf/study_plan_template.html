<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>{{ title }}</title></head>
<body class="{{ body_class }}">
<div class="running-header">{{ course_name }} · 学习计划</div>

<section class="plan-header">
  <h1>{{ course_name }} 学习计划</h1>
  <h2>{{ task_type }}</h2>
  <div class="exam-meta"><span>{{ generated_at }}</span></div>
  <div class="style-note">{{ style_note }}</div>
</section>

<main>
{% for section in sections %}
<section class="plan-section {{ section.class_name }}">
  <h2>{{ section.title }}</h2>
  <div class="section-body">{{ section.html | safe }}</div>
</section>
{% endfor %}
</main>
</body>
</html>
