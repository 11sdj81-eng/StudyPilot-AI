<figure class="diagram-block">
  <div class="figure-title">图 {{ diagram.figure_no }} {{ diagram.title }}</div>
  <img src="{{ diagram.path }}" alt="{{ diagram.title }}">
  <figcaption class="caption">{{ diagram.caption }}</figcaption>
  <div class="why"><strong>用途：</strong>{{ diagram.why_needed }}</div>
</figure>
